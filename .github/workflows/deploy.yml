# Auto-deploy on every push to master
# Render deploys the backend automatically (autoDeploy: true in render.yaml)
# Vercel deploys the frontend automatically (connected to this repo)
#
# This workflow just runs build checks so you can see pass/fail on GitHub.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: https://wacrm-backend.onrender.com/api
      VITE_SOCKET_URL: https://wacrm-backend.onrender.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
